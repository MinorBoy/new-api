# Local full-stack build from the current working tree.
# Defaults are intended for local development only.
# Run: docker compose -f docker-compose.local.yml up -d --build

name: new-api-local

services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: new-api:local
    restart: unless-stopped
    command: ["--log-dir", "/app/logs"]
    ports:
      - "127.0.0.1:${NEW_API_PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      SQL_DSN: "root:${MYSQL_ROOT_PASSWORD:-new-api-local}@tcp(mysql:3306)/new-api?charset=utf8mb4&parseTime=true&loc=Local"
      REDIS_CONN_STRING: redis://redis:6379
      TZ: Asia/Shanghai
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      NODE_NAME: new-api-local-node
      SESSION_SECRET: "${SESSION_SECRET:-}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/status | grep -Eq '\"success\"[[:space:]]*:[[:space:]]*true'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  mysql:
    image: mysql:8.2
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-new-api-local}"
      MYSQL_DATABASE: new-api
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=caching_sha2_password
    volumes:
      - local_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysql --protocol=TCP -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" -e \"SELECT 1\""]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  local_mysql_data:
